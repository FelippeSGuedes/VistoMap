name: Auto Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on company server
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          docker compose down --remove-orphans || true
          docker compose build --no-cache
          docker compose up -d
