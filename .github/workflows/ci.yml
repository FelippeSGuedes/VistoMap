name: Auto Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on company server
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Restart app
        run: |
          pm2 restart app || pm2 start npm --name app -- start
          pm2 save
