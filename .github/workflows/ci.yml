name: Auto Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          VPS_PORT_TRIM=$(echo "$VPS_PORT" | tr -d '[:space:]')
          VPS_HOST_TRIM=$(echo "$VPS_HOST" | tr -d '[:space:]')
          ssh-keyscan -p "$VPS_PORT_TRIM" -H "$VPS_HOST_TRIM" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "VPS_PORT_TRIM=$VPS_PORT_TRIM" >> $GITHUB_ENV
          echo "VPS_HOST_TRIM=$VPS_HOST_TRIM" >> $GITHUB_ENV
          echo "VPS_USER_TRIM=$(echo "$VPS_USER" | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p "$VPS_PORT_TRIM" \
            -o StrictHostKeyChecking=no \
            "$VPS_USER_TRIM@$VPS_HOST_TRIM" << 'EOF'
              cd /var/www/app
              git pull origin main
              npm install
              npm run build
              pm2 restart app
              pm2 save
          EOF
